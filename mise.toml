[tools]
bun = "1"
node = "22"
rust = "stable"

[tasks.dev]
description = "Run the Rust API and Vite app in separate terminals"
run = "echo 'Run `mise run api:dev` and `mise run web:dev` in separate shells'"

[tasks."api:dev"]
description = "Run the Rust API"
env = { RUST_LOG = "runningbuddy=debug,tower_http=info" }
run = "cargo run"

[tasks."api:test"]
description = "Run backend tests"
run = "cargo test"

[tasks."api:fmt"]
description = "Format Rust code"
run = "cargo fmt"

[tasks."web:install"]
description = "Install frontend dependencies"
run = "bun install --cwd frontend"

[tasks."web:dev"]
description = "Run the Vite frontend"
run = "bun run --cwd frontend dev"

[tasks."web:test"]
description = "Run frontend tests"
run = "bun run --cwd frontend test"

[tasks."web:build"]
description = "Build the frontend"
run = "bun run --cwd frontend build"

[tasks.test]
description = "Run backend and frontend tests"
depends = ["api:test", "web:test"]
